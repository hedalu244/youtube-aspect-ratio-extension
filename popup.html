<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Aspect Ratio Controller</title>
    <link rel="stylesheet" href="popup.css">
</head>

<body>
    <label>
        <input type="checkbox" id="enabled" disabled>
        <i></i>
        Enable
    </label>

    <div id="hideWhenDisabled" style="display: none;">
        <!--
        <label>
            <input type="checkbox" id="rememberPerVideo">
            <i></i>
            Remember per video
        </label>
        -->

        <section>
            <h2>Source Ratio</h2>
            <div class="radio-wrapper">
                <label><input type="radio" name="sourceRatio" value="auto" checked> Detected <span id="detectedRatio"
                        style="padding-left: 20px;"></span></label>
                <label><input type="radio" name="sourceRatio" value="4:3"> 4:3</label>
                <label><input type="radio" name="sourceRatio" value="16:9"> 16:9</label>

                <label>
                    <input type="radio" name="sourceRatio" value="custom">
                    Custom
                    <input type="number" id="sourceCustomX" min="1" step="1" value="4">
                    :
                    <input type="number" id="sourceCustomY" min="1" step="1" value="3">
                </label>
            </div>
        </section>

        <section>
            <h2>Target Ratio</h2>
            <div class="radio-wrapper">
                <label><input type="radio" name="targetRatio" value="original" checked> Original</label>
                <label><input type="radio" name="targetRatio" value="4:3"> 4:3</label>
                <label><input type="radio" name="targetRatio" value="16:9"> 16:9</label>

                <label>
                    <input type="radio" name="targetRatio" value="custom">
                    Custom
                    <input type="number" id="targetCustomX" min="1" step="1" value="16">
                    :
                    <input type="number" id="targetCustomY" min="1" step="1" value="9">
                </label>
            </div>
        </section>

        <section>
            <h2>Scaling Mode</h2>
            <div class="radio-wrapper">
                <label><input type="radio" name="scalingMode" value="showAll" checked> Show all</label>
                <label><input type="radio" name="scalingMode" value="coverAll"> Cover all</label>

                <label>
                    <input type="radio" name="scalingMode" value="manual">
                    Manual
                    <input type="number" id="manualScale" min="1" step="1" value="100">
                    %
                </label>
            </div>
        </section>

        <section>
            <label>
                <input type="checkbox" id="remember">
                <i></i>
                Remember settings for this video
            </label>
        </section>
    </div>
    <script src="popup.js"></script>
</body>

</html>
